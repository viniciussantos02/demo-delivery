server:
  port: 8081

spring:
  application:
    name: courier-management
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/courierdb
    username: postgres
    password: postgres
  kafka:
    consumer:
      bootstrap-servers: localhost:9092 #Endereço do broker Kafka a ser consumido
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      group-id: courier-management
      properties:                                 #Tenta primeiro desserializar a mensagem usando o JsonDeserializer, e se falhar, cai no ErrorHandlingDeserializer, que pode lidar com erros de desserialização.
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: '*'
        spring.json.type.mapping:
          delivery-placed-event:com.demoworks.demodelivery.courier.management.infrastructure.event.DeliveryPlacedIntegrationEvent,
          delivery-picked-up-event:com.fasterxml.jackson.databind.JsonNode,
          delivery-fullfilled-event:com.demoworks.demodelivery.courier.management.infrastructure.event.DeliveryFulfilledIntegrationEvent
